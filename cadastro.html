<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Criar Conta - Academic Curator</title>
</head>
<body class="bg-slate-50">
    <div class="flex min-h-screen flex-col md:flex-row">
        
        <div class="flex flex-1 flex-col justify-between bg-[#163364] p-8 md:p-16 text-white">
            <div class="flex items-center gap-2 font-semibold text-lg">
                <span class="text-2xl">📖</span>
                <span>Academic Curator</span>
            </div>
            
            <div class="max-w-xl">
                <h1 class="text-4xl md:text-6xl font-bold leading-tight mb-6">Elevando a Excelência Acadêmica</h1>
                <p class="text-lg md:text-xl opacity-80 mb-10 leading-relaxed">
                    Junte-se a uma comunidade exclusiva de scholars, pesquisadores e líderes institucionais.
                </p>
                
                <div class="bg-white/5 border border-white/10 p-6 rounded-xl max-w-md">
                    <p class="font-bold mb-2 flex items-center gap-2">
                        <span class="text-blue-400">✓</span> Processo de Cadastro
                    </p>
                    <p class="text-sm opacity-70">Crie sua conta e tenha acesso imediato ao portal de matrícula e avaliação de cursos.</p>
                </div>
            </div>
            <div class="hidden md:block"></div> </div>

        <div class="flex flex-1 items-center justify-center bg-white p-8 md:p-16">
            <div class="w-full max-w-md">
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Criar Conta</h2>
                <div class="w-10 h-1 bg-[#a16207] mb-8"></div>

                <form class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 tracking-wider mb-2">NOME COMPLETO</label>
                        <input type="text" placeholder="Seu nome completo" class="w-full p-3.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 tracking-wider mb-2">EMAIL</label>
                        <input type="email" placeholder="seu@email.edu" class="w-full p-3.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 tracking-wider mb-2">MATRÍCULA</label>
                        <input type="text" placeholder="000000000" class="w-full p-3.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 tracking-wider mb-2">DEPARTAMENTO</label>
                        <select class="w-full p-3.5 border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all text-gray-600">
                            <option value="" disabled selected>Selecione seu departamento</option>
                            <option>Ciência da Computação</option>
                            <option>Engenharia</option>
                            <option>Matemática</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 tracking-wider mb-2">SENHA</label>
                        <input type="password" placeholder="Mínimo 6 caracteres" class="w-full p-3.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                    </div>

                    <button type="submit" class="w-full py-4 bg-[#1e3a8a] hover:bg-[#1a365d] text-white font-bold rounded-full transition-colors mt-4">
                        Criar Conta
                    </button>
                </form>

                <p class="text-center mt-8 text-sm text-gray-500">
                    Já tem conta? <a href="login.html" class="text-[#1e3a8a] font-bold hover:underline">Entrar</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
