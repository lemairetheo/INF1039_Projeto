<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Curator - Avaliações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <span class="icon">📖</span> Academic Curator
            </div>
            <nav>
                <a href="#">Disciplinas</a>
                <a href="#">Matrícula</a>
                <a href="#">Horário</a>
                <a href="#" class="active">Avaliações</a>
                <a href="#">Professores</a>
                <a href="#" id="btn-minhas-avaliacoes-nav">Minhas Avaliações</a>
                <a href="#">Perfil</a>
            </nav>
            <div class="user-profile">J</div>
        </div>
    </header>

    <main>
        <div class="hero-section">
            <div class="titles">
                <h1>Avaliações</h1>
                <p>Veja avaliações dos estudantes ou compartilhe a sua.</p>
            </div>
            <div class="actions">
                <button class="btn-secondary" id="btn-ver-todas">Minhas Avaliações</button>
                <button class="btn-primary" id="btn-nova-avaliacao">+ Nova Avaliação</button>
            </div>
        </div>

        <div class="filters">
            <select><option>Todos os professores</option></select>
            <select><option>Todas as disciplinas</option></select>
        </div>

        <p class="count"><span id="total-count">0</span> avaliação(ões)</p>

        <section id="feed-avaliacoes">
            <!-- As avaliações aparecerão aqui via JavaScript -->
        </section>
    </main>

    <!-- Modal para Nova Avaliação -->
    <div id="modal-avaliacao" class="modal">
        <div class="modal-content">
            <h2>Nova Avaliação</h2>
            <form id="form-avaliacao">
                <input type="text" id="input-disciplina" placeholder="Nome da Disciplina" required>
                <input type="text" id="input-professor" placeholder="Nome do Professor" required>
                <textarea id="input-comentario" placeholder="Seu comentário..." required></textarea>
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" id="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-primary">Publicar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
