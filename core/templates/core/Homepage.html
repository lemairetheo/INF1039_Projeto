<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Curator | Início</title>
    <!-- Referência ao seu arquivo CSS puro e atualizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Começa diretamente no conteúdo, sem Navbar -->
    <main class="content-wrapper">
        
        <!-- Hero Section -->
        <header>
            <span class="academic-tag">Portal Acadêmico</span>
            <h2 class="main-title">
                Encontre sua próxima<br>
                <span>descoberta intelectual.</span>
            </h2>
        </header>

        <!-- Campo de Busca -->
        <section class="search-container">
            <!-- Ícone de Lupa Simples (SVG) -->
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" class="search-input" placeholder="Buscar cursos, professores ou departamentos...">
        </section>

        <!-- Seção de Listagem (Resultados) -->
        <section>
            <h3 class="section-title">Cursos Disponíveis</h3>
            <p class="section-subtitle">Curados para a excelência acadêmica.</p>
            
            <!-- Área de "Nenhum Curso Encontrado" (Visível por padrão até ter lógica do Django) -->
            <div class="no-results-area">
                <!-- Ícone de Lupa com X Simples (SVG) -->
                <svg class="no-results-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 10l4 4m0-4l-4 4" />
                </svg>
                <p class="no-results-text">Nenhum curso encontrado.</p>
            </div>
        </section>

    </main>

    <footer>
        &copy; 2026 Academic Curator - Projetado para a melhor experiência estudantil.
    </footer>

</body>
</html>
