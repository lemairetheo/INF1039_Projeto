<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academic Curator</title>
    <link rel="stylesheet" href="{% static 'core/css/login.css' %}">
</head>
<body>
    <div class="container">
        
        <!-- Lado Esquerdo: Branding -->
        <div class="info-panel">
            <div class="brand">
                <span>📖</span>
                <span>Academic Curator</span>
            </div>
            
            <div class="hero-text">
                <h1>Sua Inteligência, Curada.</h1>
                <p>Acesse um ecossistema de scholars e pesquisadores. Educação como uma galeria curada de conhecimento.</p>
            </div>

            <div class="trust-badge">
                Confiado por pesquisadores em todo o mundo.
            </div>
        </div>

        <!-- Lado Direito: Formulário -->
        <div class="form-panel">
            <div class="form-container">
                <h2>Bem-vindo de Volta</h2>
                <p class="subtitle">Continue sua jornada intelectual.</p>

                <form>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="seu@email.edu" required>
                    </div>

                    <div class="form-group">
                        <div class="label-wrapper">
                            <label>Senha</label>
                            <a href="#" class="forgot-link">Esqueceu?</a>
                        </div>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit">Acessar Portal</button>
                </form>

                <p class="footer-link">
                    Ainda não tem conta? <a href="register.html">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
