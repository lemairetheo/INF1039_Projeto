<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Academic Curator</title>
</head>
<body class="bg-slate-50">
    <div class="flex min-h-screen flex-col md:flex-row">
        
        <div class="flex flex-1 flex-col justify-between bg-[#163364] p-8 md:p-16 text-white">
            <div class="flex items-center gap-2 font-semibold text-lg">
                <span class="text-2xl">📖</span>
                <span>Academic Curator</span>
            </div>
            
            <div class="max-w-xl">
                <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-6">Sua Inteligência, Curada.</h1>
                <p class="text-lg md:text-xl opacity-80 leading-relaxed">
                    Acesse um ecossistema de scholars e pesquisadores. Educação como uma galeria curada de conhecimento.
                </p>
            </div>

            <div class="text-sm opacity-60">
                Confiado por pesquisadores em todo o mundo.
            </div>
        </div>

        <div class="flex flex-1 items-center justify-center bg-white p-8 md:p-16">
            <div class="w-full max-w-md">
                <h2 class="text-3xl font-bold text-gray-900 mb-1">Bem-vindo de Volta</h2>
                <p class="text-gray-500 mb-10">Continue sua jornada intelectual.</p>

                <form class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 tracking-wider mb-2">EMAIL</label>
                        <input type="email" placeholder="seu@email.edu" class="w-full p-3.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-bold text-gray-500 tracking-wider">SENHA</label>
                            <a href="#" class="text-[10px] font-bold text-[#1e3a8a] hover:underline">Esqueceu?</a>
                        </div>
                        <input type="password" placeholder="••••••••" class="w-full p-3.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                    </div>

                    <button type="submit" class="w-full py-4 bg-[#1e3a8a] hover:bg-[#1a365d] text-white font-bold rounded-full transition-colors">
                        Acessar Portal
                    </button>
                </form>

                <p class="text-center mt-10 text-sm text-gray-500">
                    Ainda não tem conta? <a href="index.html" class="text-[#1e3a8a] font-bold hover:underline">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
