<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Academic Curator</title>
    <link rel="stylesheet" href={% static 'core/css/cadastro1.css' %}>
</head>
<body>
    <div class="container">
        
        <!-- Lado Esquerdo: Branding -->
        <div class="info-panel">
            <div class="brand">
                <span>📖</span>
                <span>Academic Curator</span>
            </div>
            
            <div class="hero-text">
                <h1>Elevando a Excelência Acadêmica</h1>
                <p>Junte-se a uma comunidade exclusiva de scholars, pesquisadores e líderes institucionais.</p>
                
                <div class="process-card">
                    <p style="font-bold; margin-bottom: 8px;">
                        <span style="color: #60a5fa;">✓</span> Processo de Cadastro
                    </p>
                    <p style="font-size: 0.875rem; opacity: 0.7;">Crie sua conta e tenha acesso imediato ao portal de matrícula e avaliação de cursos.</p>
                </div>
            </div>
            <div></div> <!-- Espaçador para o layout flex -->
        </div>

        <!-- Lado Direito: Formulário -->
        <div class="form-panel">
            <div class="form-container">
                <h2>Criar Conta</h2>
                <div class="divider"></div>

                <form>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" placeholder="Seu nome completo" required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="seu@email.edu" required>
                    </div>

                    <div class="form-group">
                        <label>Matrícula</label>
                        <input type="text" placeholder="000000000" required>
                    </div>

                    <div class="form-group">
                        <label>Departamento</label>
                        <select required>
                            <option value="" disabled selected>Selecione seu departamento</option>
                            <option>Ciência da Computação</option>
                            <option>Engenharia</option>
                            <option>Matemática</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <button type="submit" class="btn-submit">Criar Conta</button>
                </form>

                <p class="footer-link">
                    Já tem conta? <a href="login.html">Entrar</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
